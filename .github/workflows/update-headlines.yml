name: Update headlines.json

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: Build data/headlines.json
        run: |
          python - <<'PY'
          import json, os, time
import feedparser

FEEDS = [
  {"group":"canada","name":"CBC Top Stories","url":"https://www.cbc.ca/webfeed/rss/rss-topstories"},
  {"group":"nl","name":"CBC Newfoundland & Labrador","url":"https://www.cbc.ca/webfeed/rss/rss-canada-newfoundland"},
  {"group":"nl","name":"VOCM","url":"https://vocm.com/feed/"},
  {"group":"world","name":"BBC World","url":"https://feeds.bbci.co.uk/news/rss.xml"},
]

MIX = {"canada":7,"nl":7,"world":7}

out = {
  "generated": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
  "headlines":[]
}

grouped = {"canada":[],"nl":[],"world":[]}

for f in FEEDS:
  try:
    d = feedparser.parse(f["url"])
    for e in d.entries[:10]:
      grouped[f["group"]].append({
        "source":f["name"],
        "title":e.get("title",""),
        "link":e.get("link","")
      })
  except Exception:
    pass

for g in ["canada","nl","world"]:
  out["headlines"].extend(grouped[g][:MIX[g]])

os.makedirs("data",exist_ok=True)

with open("data/headlines.json","w",encoding="utf-8") as f:
  json.dump(out,f,indent=2)

print("Generated",len(out["headlines"]),"headlines")
          PY

      - name: Commit and push (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/headlines.json
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "Update headlines.json"
          git push
