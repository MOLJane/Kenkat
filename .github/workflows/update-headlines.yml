name: Update headlines.json

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes

permissions:
  contents: write

concurrency:
  group: update-headlines
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build data/headlines.json (with images)
        shell: bash
        run: |
          python - << 'PY'
          import json, os, re, urllib.request, xml.etree.ElementTree as ET
          from datetime import datetime

          OUT_DIR = "data"
          OUT_PATH = os.path.join(OUT_DIR, "headlines.json")

          FEEDS = [
            ("CBC Top Stories", "https://www.cbc.ca/webfeed/rss/rss-topstories"),
            ("CBC Newfoundland & Labrador", "https://www.cbc.ca/webfeed/rss/rss-canada-newfoundland"),
            ("BBC World", "https://feeds.bbci.co.uk/news/rss.xml?edition=int"),
            ("VOCM", "https://vocm.com/feed/"),
          ]

          PER_FEED_TIMEOUT_SEC = 7
          MAX_ITEMS_PER_FEED = 6
          SNIPPET_LEN = 180

          IMG_RE = re.compile(r'<img[^>]+src=["\']([^"\']+)["\']', re.I)

          def strip_html(s: str) -> str:
            if not s:
              return ""
            s = re.sub(r"<[^>]+>", " ", s)
            s = re.sub(r"\s+", " ", s).strip()
            return s

          def fetch_url(url: str, timeout: int) -> bytes:
            req = urllib.request.Request(
              url,
              headers={"User-Agent": "Mozilla/5.0 (GitHub Actions headlines bot)"},
            )
            with urllib.request.urlopen(req, timeout=timeout) as resp:
              return resp.read()

          def localname(tag: str) -> str:
            return tag.split("}")[-1] if "}" in tag else tag

          def find_first_child_text(elem, names):
            for child in list(elem):
              if localname(child.tag) in names:
                return (child.text or "").strip()
            return ""

          def find_link(elem):
            # RSS: <link>text</link>, Atom: <link href="..."/>
            for child in list(elem):
              if localname(child.tag) == "link":
                href = (child.attrib.get("href") or "").strip()
                if href:
                  return href
                txt = (child.text or "").strip()
                if txt:
                  return txt
            return ""

          def find_description_html(elem):
            for key in ("description", "summary", "content"):
              txt = find_first_child_text(elem, {key})
              if txt:
                return txt
            return ""

          def image_from_description(html):
            if not html:
              return None
            m = IMG_RE.search(html)
            return m.group(1).strip() if m else None

          def find_image(elem, desc_html):
            # media:content url="..."
            for child in list(elem):
              if localname(child.tag) == "content":
                url = (child.attrib.get("url") or "").strip()
                if url:
                  return url

            # Look for any tag ending in ":content" or "media:content"
            for child in list(elem):
              if localname(child.tag) == "content" and "media" in child.tag:
                url = (child.attrib.get("url") or "").strip()
                if url:
                  return url

            # enclosure url="..."
            for child in list(elem):
              if localname(child.tag) == "enclosure":
                url = (child.attrib.get("url") or "").strip()
                if url:
                  return url

            # fallback: <img src> inside description
            return image_from_description(desc_html)

          def parse_items(xml_bytes: bytes):
            root = ET.fromstring(xml_bytes)
            items = root.findall(".//item")
            if items:
              return items, "rss"
            entries = root.findall(".//{*}entry")
            return entries, "atom"

          all_items = []
          errors = []

          for name, url in FEEDS:
            try:
              xml_bytes = fetch_url(url, PER_FEED_TIMEOUT_SEC)
              entries, kind = parse_items(xml_bytes)
              if not entries:
                raise Exception("No items found")

              for it in entries[:MAX_ITEMS_PER_FEED]:
                title = find_first_child_text(it, {"title"}) or "(no title)"
                link = find_link(it) or url

                desc_html = find_description_html(it)
                snippet = strip_html(desc_html)[:SNIPPET_LEN]

                pub = (
                  find_first_child_text(it, {"pubDate"})
                  or find_first_child_text(it, {"updated"})
                  or find_first_child_text(it, {"published"})
                )
                pub = (pub or "").strip()[:60]

                image = find_image(it, desc_html)

                all_items.append({
                  "source": name,
                  "title": title,
                  "link": link,
                  "snippet": snippet,
                  "pub": pub,
                  "image": image or ""
                })

            except Exception as e:
              errors.append(f"{name}: {e}")

          os.makedirs(OUT_DIR, exist_ok=True)
          payload = {
            "generated_at": datetime.utcnow().isoformat() + "Z",
            "count": len(all_items),
            "items": all_items,
            "errors": errors,
          }

          with open(OUT_PATH, "w", encoding="utf-8") as f:
            json.dump(payload, f, ensure_ascii=False, indent=2)

          print(f"Wrote {OUT_PATH} with {len(all_items)} items")
          if errors:
            print("Some feeds failed (non-fatal):")
            for e in errors:
              print(" -", e)
          PY

      - name: Commit and push (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/headlines.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update headlines.json"
          git push
