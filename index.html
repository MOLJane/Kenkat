<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kay’s Page</title>

<meta http-equiv="refresh" content="900">

<style>

:root{
  --bg: #f6f6f4;
  --card: #ffffff;
  --ink: #1a1a1a;
  --muted: #555;
  --line: #ddd;
  --shadow: 0 2px 10px rgba(0,0,0,.08);
  --radius: 14px;
  --pad: 14px;

  /* senior-friendly sizing */
  --h1: 34px;
  --h2: 20px;
  --body: 18px;
  --small: 15px;
}

* { box-sizing: border-box; }

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color: var(--ink);
  background: var(--bg);
}

.wrap{
  max-width: 1200px;
  margin: 0 auto;
  padding: 14px;
  display: grid;
  gap: 14px;
}

header.hero{
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  background: #000;
  box-shadow: var(--shadow);
  min-height: 175px;
}

header.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom, rgba(0,0,0,.40), rgba(0,0,0,.58)),
    url("beach2.jpeg") center/cover no-repeat;
  filter: saturate(1.05);
  transform: scale(1.02);
}

.hero-content{
  position: relative;
  padding: 18px 18px 16px;
  display:flex;
  align-items:flex-end;
  justify-content: space-between;
  gap: 12px;
  min-height: 175px;
}

.titleblock{
  display:flex;
  flex-direction: column;
  gap: 6px;
}

.site-title{
  margin:0;
  font-size: var(--h1);
  letter-spacing: .2px;
  color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,.35);
}

.today{
  margin:0;
  font-size: var(--h2);
  color: rgba(255,255,255,.92);
  text-shadow: 0 2px 12px rgba(0,0,0,.35);
}

.weatherline{
  margin: 2px 0 0 0;
  font-size: 18px;
  color: rgba(255,255,255,.95);
  text-shadow: 0 2px 12px rgba(0,0,0,.35);
}

.controls{
  display:flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  justify-content: flex-end;
}

.pill{
  border: 1px solid rgba(255,255,255,.35);
  background: rgba(255,255,255,.14);
  color: #fff;
  padding: 8px 10px;
  border-radius: 999px;
  font-size: var(--small);
  backdrop-filter: blur(6px);
  cursor: pointer;
  user-select: none;
  text-decoration: none;
}

.pill:active { transform: translateY(1px); }

.topbar{
  display: grid;
  gap: 10px;
}

.rowbar{
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 10px;
}

@media (max-width: 1100px){
  .rowbar{ grid-template-columns: repeat(4, minmax(0,1fr)); }
}

@media (max-width: 700px){
  .rowbar{ grid-template-columns: repeat(2, minmax(0,1fr)); }
}

.bigbtn{
  display: block;
  text-align: center;
  background: #ffffff;
  border: 1px solid #ddd;
  padding: 14px 10px;
  border-radius: 12px;
  font-size: 20px;
  text-decoration: none;
  color: #111;
  box-shadow: 0 2px 6px rgba(0,0,0,.08);
}

.bigbtn:hover{ background:#f3f3f3; }

.grid-top{
  display:grid;
  gap: 14px;
  grid-template-columns: 1.2fr .8fr;
  align-items: start;
}

@media (max-width: 980px){
  .grid-top { grid-template-columns: 1fr; }
}

.card{
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: var(--pad);
}

.card h2{
  margin: 0 0 10px 0;
  font-size: 22px;
}

.muted{
  color: var(--muted);
  font-size: var(--body);
}

iframe.calendar{
  width:100%;
  height: 420px;
  border:0;
  border-radius: 12px;
  background:#fff;
}

textarea.notes{
  width:100%;
  min-height: 180px;
  border-radius: 12px;
  border: 1px solid var(--line);
  padding: 12px;
  font-size: 18px;
}

.photo-frame{
  padding:8px;
}

.card img:hover{
  transform: scale(1.02);
  transition: transform .2s ease;
}

</style>
