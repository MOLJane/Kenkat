<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kay’s Page</title>

<meta http-equiv="refresh" content="1200">

<style>
body{
  margin:0;
  font-family:system-ui,Segoe UI,Arial;
  background:#f6f6f4;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:16px;
}

h1{margin:0;font-size:34px}

.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:16px;
}

.card{
  background:white;
  border-radius:14px;
  padding:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.news-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.news-item{
  border:1px solid #ddd;
  border-radius:10px;
  overflow:hidden;
}

.news-thumb{
  height:120px;
  background:#e9e9e9;
  display:flex;
  align-items:center;
  justify-content:center;
}

.news-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.news-body{
  padding:10px;
}

.news-title{
  font-size:18px;
  margin:0;
}

.news-snippet{
  font-size:15px;
  color:#555;
}

.news-meta{
  font-size:14px;
  color:#777;
}

.bigbtn{
  display:block;
  padding:14px;
  border-radius:10px;
  background:white;
  text-decoration:none;
  border:1px solid #ddd;
  margin-bottom:8px;
  font-size:18px;
}

iframe{
  width:100%;
  height:420px;
  border:0;
}

textarea{
  width:100%;
  height:200px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Kay’s Page</h1>

<div class="grid">

<div class="card">
<h2>Top Headlines</h2>
<div class="news-grid" id="newsGrid"></div>
<div id="newsStatus">Loading headlines…</div>
</div>

<div>

<div class="card">

<a class="bigbtn" href="https://vocm.com/" target="_blank">VOCM News</a>
<a class="bigbtn" href="https://www.cbc.ca/news" target="_blank">CBC News</a>
<a class="bigbtn" href="https://www.messenger.com/" target="_blank">Messenger</a>
<a class="bigbtn" href="https://tv.bell.ca/card/channel/CBCNH" target="_blank">CBC TV</a>

</div>

<div class="card">
<h2>Calendar</h2>

<iframe
src="https://calendar.google.com/calendar/embed?src=kenkatbarry%40gmail.com&ctz=America%2FSt_Johns&mode=MONTH&showTitle=0">
</iframe>

</div>

<div class="card">

<h2>Notes</h2>

<textarea id="notesBox"></textarea>

</div>

</div>

</div>

</div>

<script>

/* NOTES SAVE */

const notes=document.getElementById("notesBox")
notes.value=localStorage.getItem("kay_notes")||""

notes.addEventListener("input",()=>{
localStorage.setItem("kay_notes",notes.value)
})


/* NEWS CARD */

function newsCard(item){

const el=document.createElement("div")
el.className="news-item"

const thumb=document.createElement("div")
thumb.className="news-thumb"

if(item.image){
const img=document.createElement("img")
img.src=item.image
thumb.appendChild(img)
}else{
thumb.innerHTML="📰"
}

const body=document.createElement("div")
body.className="news-body"

const title=document.createElement("p")
title.className="news-title"

const link=document.createElement("a")
link.href=item.link
link.target="_blank"
link.textContent=item.title

title.appendChild(link)

const snip=document.createElement("p")
snip.className="news-snippet"
snip.textContent=item.snippet

const meta=document.createElement("div")
meta.className="news-meta"
meta.textContent=item.source

body.appendChild(title)
body.appendChild(snip)
body.appendChild(meta)

el.appendChild(thumb)
el.appendChild(body)

return el
}


/* LOAD HEADLINES */

async function loadHeadlines(){

const grid=document.getElementById("newsGrid")
const status=document.getElementById("newsStatus")

try{

const res=await fetch("./data/headlines.json?v="+Date.now())

const data=await res.json()

const items=data.items||[]

grid.innerHTML=""

items.forEach(item=>{
grid.appendChild(newsCard(item))
})

status.textContent="Headlines updated"

}catch(e){

status.innerHTML="Headlines unavailable"

}

}


loadHeadlines()

</script>

</body>
</html>
